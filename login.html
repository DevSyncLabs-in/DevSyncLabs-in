<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Login | DevSync Labs</title>
  <meta name="description" content="Sign in to your DevSync Labs account to access projects, courses, and resources.">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="Chat.png">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="login-page">
  <!-- Animated background elements -->
  <div class="login-bg-grid"></div>
  <div class="login-orb login-orb-1"></div>
  <div class="login-orb login-orb-2"></div>
  <div class="login-orb login-orb-3"></div>

  <div class="login-container">
    <!-- Left Panel — Login Form -->
    <div class="login-left">
      <a href="index.html" class="login-brand">
        <div class="brand-icon"><i class="fas fa-code"></i></div>
        <span>DEVSYNC LABS</span>
      </a>

      <h1>Welcome Back</h1>
      <p class="login-subtitle">Sign in to access your dashboard, projects, and resources.</p>

      <form class="login-form" id="login-form">
        <div class="form-group">
          <label for="login-email">Email Address</label>
          <div class="input-wrapper">
            <input type="email" id="login-email" placeholder="you@example.com" required autocomplete="email">
            <i class="fas fa-envelope"></i>
          </div>
        </div>

        <div class="form-group">
          <label for="login-password">Password</label>
          <div class="input-wrapper">
            <input type="password" id="login-password" placeholder="Enter your password" required autocomplete="current-password">
            <i class="fas fa-lock"></i>
            <button type="button" class="password-toggle" aria-label="Toggle password visibility">
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>

        <div class="login-options">
          <label class="remember-me">
            <input type="checkbox" id="remember-me"> Remember me
          </label>
          <a href="#" class="forgot-link">Forgot password?</a>
        </div>

        <button type="submit" class="btn btn-primary login-btn">
          <i class="fas fa-sign-in-alt"></i> Sign In
        </button>

        <div class="login-divider">or continue with</div>

        <div class="social-login-buttons">
          <button type="button" class="social-login-btn" onclick="showToast('Google login coming soon!', 'error')">
            <i class="fab fa-google"></i> Google
          </button>
          <button type="button" class="social-login-btn" onclick="showToast('GitHub login coming soon!', 'error')">
            <i class="fab fa-github"></i> GitHub
          </button>
          <button type="button" class="social-login-btn" onclick="showToast('LinkedIn login coming soon!', 'error')">
            <i class="fab fa-linkedin-in"></i> LinkedIn
          </button>
        </div>

        <p class="login-footer-text">
          Don't have an account? <a href="https://www.devsynclabs.in" target="_blank">Join the Waitlist</a>
        </p>
      </form>
    </div>

    <!-- Right Panel — Illustration & Branding -->
    <div class="login-right">
      <div class="login-shape login-shape-1"></div>
      <div class="login-shape login-shape-2"></div>
      <div class="login-shape login-shape-3"></div>

      <div class="login-right-content">
        <img src="assets/hero-illustration.png" alt="DevSync Labs Platform">
        <h3>Build. Learn. Innovate.</h3>
        <p>Access your projects, track progress, and collaborate with your team — all in one place.</p>
      </div>
    </div>
  </div>
</div>

<!-- Scripts -->
<script src="js/main.js"></script>

</body>
</html>
